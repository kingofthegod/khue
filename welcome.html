<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
:root {
  --c1: #00f6ff;
  --c2: #7a00ff;
}
html,body {
  margin:0; padding:0;
  height:100%;
  overflow:hidden;
  font-family: "Inter", sans-serif;
  background: radial-gradient(circle at 20% 30%, rgba(0,246,255,0.06), transparent 20%),
              radial-gradient(circle at 80% 70%, rgba(122,0,255,0.05), transparent 20%),
              linear-gradient(160deg, #060013 0%, #080023 60%, #060013 100%);
  color:#eafaff;
}

.bg-anim {
  position:fixed;
  inset:-30%;
  background: linear-gradient(120deg, #080029, #00121a, #18004d, #00101f);
  background-size: 400% 400%;
  animation: bgShift 12s ease infinite;
  filter: blur(80px) brightness(1.2);
  z-index:0;
}
@keyframes bgShift {
  0% {background-position:0% 50%}
  50% {background-position:100% 50%}
  100% {background-position:0% 50%}
}

canvas#fireworks {
  position:fixed; inset:0;
  z-index:1;
  pointer-events:none;
}

.container {
  position:relative;
  z-index:5;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100%;
  text-align:center;
}

.title {
  font-size:64px;
  font-weight:900;
  letter-spacing:4px;
  background: linear-gradient(90deg,var(--c1),var(--c2));
  -webkit-background-clip:text;
  color:transparent;
  text-shadow: 0 0 25px rgba(0,246,255,0.2);
  opacity:0;
}

.subtitle {
  font-size:22px;
  color:#ccfaff;
  opacity:0;
  margin-top:10px;
  letter-spacing:1px;
}

.btn-start {
  position:relative;
  margin-top:40px;
  padding:12px 28px;
  font-weight:700;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,var(--c1),var(--c2));
  color:#021;
  overflow:hidden;
  cursor:pointer;
  box-shadow:0 0 25px rgba(122,0,255,0.2);
  opacity:0;
  transition: transform .2s ease;
}
.btn-start:hover {
  transform:translateY(-4px);
  box-shadow:0 0 40px rgba(122,0,255,0.35);
}
.btn-start::after {
  content:"";
  position:absolute;
  left:-50%;
  top:0;
  width:60%;
  height:100%;
  background:linear-gradient(90deg,rgba(255,255,255,0.3),rgba(255,255,255,0.05));
  transform:skewX(-20deg);
  animation:sweep 1.6s linear infinite;
}
@keyframes sweep {
  0%{left:-60%}
  100%{left:140%}
}

/* Fade-out overlay for redirect */
.fadeout {
  position:fixed; inset:0;
  background:#000;
  opacity:0;
  pointer-events:none;
  transition: opacity .6s ease;
  z-index:99;
}
.fadeout.show {opacity:1; pointer-events:auto;}
</style>
</head>
<body>

<div class="bg-anim"></div>
<canvas id="fireworks"></canvas>

<div class="container">
  <h1 class="title">Welcome to Window Clone</h1>

gsap.to(".title",{opacity:1,duration:1,y:-10,ease:"power2.out"});
